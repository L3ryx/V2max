<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nano Banana AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b3d02;
text-align:center;
color:white;
}

.container{
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:25px;
width:80%;
margin:auto;
margin-top:60px;
box-shadow:0 0 40px black;
}

textarea{
width:90%;
height:120px;
border-radius:15px;
padding:15px;
border:none;
font-size:16px;
resize:none;
}

button{
background:red;
color:white;
padding:12px 20px;
border:none;
border-radius:15px;
cursor:pointer;
margin:10px;
}

button:hover{
opacity:0.8;
}

img{
margin-top:20px;
max-width:500px;
border-radius:20px;
display:none;
}

.loader{
display:none;
margin-top:20px;
color:yellow;
}

</style>
</head>
<body>

<div class="container">

<h1>🔥 Nano Banana AI</h1>

<textarea id="prompt" placeholder="Décris ton image..."></textarea>

<br>

<button onclick="optimize()">🦙 Optimiser</button>
<button onclick="generate()">🍌 Générer</button>

<div class="loader" id="loader">
⏳ Génération...
</div>

<img id="image"/>

</div>

<script>

/* 🔥 MET TON URL RENDER ICI */
const API_URL = "https://TON-URL.onrender.com";

async function optimize(){

const prompt = document.getElementById("prompt").value;

const res = await fetch(API_URL + "/optimize", {
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({ prompt })
});

const data = await res.json();

if(data.optimized){
document.getElementById("prompt").value = data.optimized;
}

}

async function generate(){

const prompt = document.getElementById("prompt").value;

document.getElementById("loader").style.display="block";

const res = await fetch(API_URL + "/generate-image",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({ prompt })
});

const data = await res.json();

if(data.image){

const img = document.getElementById("image");
img.src = "data:image/png;base64," + data.image;
img.style.display = "block";

}else{
alert("Erreur génération");
}

document.getElementById("loader").style.display="none";

}

</script>

</body>
</html>
