<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nano Banana Tropical AI</title>

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background: linear-gradient(to bottom,#0b3d02,#145c0a,#1b7a14);
color:white;
text-align:center;
overflow-x:hidden;
min-height:100vh;
position:relative;
}

/* ========================= */
/* 🌞 SUN ANIMATION */
/* ========================= */

.sun{
position:fixed;
top:-100px;
right:-100px;
width:400px;
height:400px;
background:radial-gradient(circle,#ffd000 0%,#ff8c00 40%,transparent 70%);
border-radius:50%;
filter:blur(40px);
animation:sunPulse 6s infinite alternate;
z-index:0;
}

@keyframes sunPulse{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

/* ========================= */
/* 🌴 PALMIERS */
/* ========================= */

.palm{
position:fixed;
bottom:0;
width:220px;
opacity:0.8;
animation:sway 6s infinite ease-in-out alternate;
z-index:1;
}

.palm.left{left:0;}
.palm.right{right:0;}

@keyframes sway{
0%{transform:rotate(-4deg);}
100%{transform:rotate(4deg);}
}

/* ========================= */
/* 🍃 FEUILLES QUI TOMBENT */
/* ========================= */

.leaf{
position:fixed;
font-size:22px;
opacity:0.6;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

/* ========================= */
/* 🍌 BANANES VOLANTES */
/* ========================= */

.banana{
position:fixed;
font-size:35px;
animation:bananaMove linear infinite;
z-index:2;
}

@keyframes bananaMove{
0%{transform:translateX(-10vw) translateY(100vh) rotate(0deg);}
100%{transform:translateX(110vw) translateY(-10vh) rotate(720deg);}
}

/* ========================= */
/* CONTAINER */
/* ========================= */

.container{
position:relative;
z-index:10;
width:90%;
max-width:750px;
margin:80px auto;
padding:50px;
border-radius:30px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(20px);
box-shadow:0 0 80px rgba(0,0,0,0.8);
border:1px solid rgba(255,255,255,0.1);
}

/* ========================= */
/* TITLE */
/* ========================= */

h1{
font-size:42px;
margin-bottom:30px;
color:#fff;
text-shadow:0 0 20px orange;
animation:glow 3s infinite alternate;
}

@keyframes glow{
0%{text-shadow:0 0 10px orange;}
100%{text-shadow:0 0 40px yellow;}
}

/* ========================= */
/* INPUT */
/* ========================= */

textarea{
width:100%;
height:120px;
border-radius:20px;
padding:20px;
border:none;
outline:none;
font-size:16px;
resize:none;
}

/* ========================= */
/* BUTTONS */
/* ========================= */

button{
background:#ff9800;
color:white;
padding:14px 28px;
border:none;
border-radius:50px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
margin:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

button:hover{
transform:translateY(-4px);
background:#ff6f00;
}

/* ========================= */
/* IMAGE */
/* ========================= */

#image{
max-width:100%;
border-radius:20px;
margin-top:20px;
display:none;
box-shadow:0 0 40px black;
}

.loader{
display:none;
margin-top:20px;
color:yellow;
}

</style>
</head>
<body>

<!-- SUN -->
<div class="sun"></div>

<!-- PALMIERS -->
<img src="https://i.imgur.com/6X9ZJ5L.png" class="palm left">
<img src="https://i.imgur.com/6X9ZJ5L.png" class="palm right">

<div class="container">

<h1>🍌🌴 Nano Banana Tropical AI 🌴🍌</h1>

<textarea id="prompt" placeholder="Décris ton image tropicale..."></textarea>

<br>

<button onclick="optimize()">🦙 Optimiser</button>
<button onclick="generate()">🚀 Générer</button>

<div class="loader" id="loader">⏳ Génération...</div>

<img id="image"/>

</div>

<script>

/* ========================= */
/* FEUILLES AUTOMATIQUES */
/* ========================= */

for(let i=0;i<25;i++){
const leaf=document.createElement("div");
leaf.classList.add("leaf");
leaf.innerHTML="🍃";
leaf.style.left=Math.random()*100+"vw";
leaf.style.animationDuration=(5+Math.random()*10)+"s";
leaf.style.animationDelay="-"+Math.random()*10+"s";
document.body.appendChild(leaf);
}

/* ========================= */
/* BANANES ANIMEES */
/* ========================= */

for(let i=0;i<15;i++){
const banana=document.createElement("div");
banana.classList.add("banana");
banana.innerHTML="🍌";
banana.style.top=Math.random()*100+"vh";
banana.style.animationDuration=(8+Math.random()*15)+"s";
banana.style.animationDelay="-"+Math.random()*10+"s";
document.body.appendChild(banana);
}

/* ========================= */
/* API */
/* ========================= */

async function optimize(){
const prompt=document.getElementById("prompt").value;

const res=await fetch("/optimize",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data=await res.json();
if(data.optimized){
document.getElementById("prompt").value=data.optimized;
}
}

async function generate(){
const prompt=document.getElementById("prompt").value;

document.getElementById("loader").style.display="block";
document.getElementById("image").style.display="none";

const res=await fetch("/generate-image",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data=await res.json();

if(data.image){
document.getElementById("image").src="data:image/png;base64,"+data.image;
document.getElementById("image").style.display="block";
}

document.getElementById("loader").style.display="none";
}

</script>

</body>
</html>
