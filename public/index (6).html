<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nano Banana AI</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #0b3d02 0%, #1a5e0a 30%, #0d4a03 60%, #145209 100%);
  text-align: center;
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

#bg-foliage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.leaf {
  position: absolute;
  opacity: 0.15;
  filter: blur(1px);
}

.leaf svg {
  fill: #2ecc40;
}

.leaf-1 { top: -30px; left: -40px; transform: rotate(-20deg); opacity: 0.2; }
.leaf-2 { top: -20px; right: -30px; transform: rotate(30deg) scaleX(-1); opacity: 0.18; }
.leaf-3 { bottom: -40px; left: 10%; transform: rotate(160deg); opacity: 0.12; }
.leaf-4 { bottom: -20px; right: 5%; transform: rotate(-150deg) scaleX(-1); opacity: 0.15; }
.leaf-5 { top: 30%; left: -20px; transform: rotate(40deg); opacity: 0.08; }
.leaf-6 { top: 40%; right: -30px; transform: rotate(-30deg) scaleX(-1); opacity: 0.1; }

#bananas-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

.banana {
  position: absolute;
  font-size: 40px;
  opacity: 0.6;
  animation: bananaFloat linear infinite;
  will-change: transform;
}

@keyframes bananaFloat {
  0% {
    transform: translateY(110vh) rotate(0deg);
  }
  100% {
    transform: translateY(-10vh) rotate(360deg);
  }
}

.container {
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 45px 40px;
  border-radius: 30px;
  width: 85%;
  max-width: 720px;
  margin: 80px auto 40px;
  box-shadow: 0 8px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.06);
  position: relative;
  z-index: 10;
}

.title-3d {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 3px;
  margin-bottom: 30px;
  perspective: 600px;
  flex-wrap: wrap;
  width: 100%;
}

.title-3d .letter {
  display: inline-block;
  font-size: clamp(24px, 6vw, 48px);
  font-weight: 900;
  color: #fff;
  text-shadow:
    0 1px 0 #ccc,
    0 2px 0 #bbb,
    0 3px 0 #aaa,
    0 4px 0 #999,
    0 5px 0 #888,
    0 6px 6px rgba(0,0,0,0.4),
    0 0 20px rgba(255,165,0,0.3);
  animation: letterSpin 3s ease-in-out infinite;
  transform-style: preserve-3d;
  line-height: 1.2;
}

.title-3d .letter.space {
  width: clamp(8px, 2vw, 16px);
}

@keyframes letterSpin {
  0%, 100% {
    transform: rotateY(0deg);
  }
  50% {
    transform: rotateY(360deg);
  }
}

textarea {
  width: 92%;
  height: 120px;
  border-radius: 18px;
  padding: 16px 20px;
  border: 2px solid rgba(255, 165, 0, 0.3);
  font-size: 16px;
  resize: none;
  background: rgba(255, 255, 255, 0.95);
  color: #333;
  transition: border-color 0.3s, box-shadow 0.3s;
  outline: none;
}

textarea:focus {
  border-color: #ff8c00;
  box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
}

textarea::placeholder {
  color: #999;
}

.options-section {
  margin-top: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.btn-bg {
  background: linear-gradient(135deg, #555, #444);
  color: white;
  padding: 10px 22px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.btn-bg:hover {
  background: linear-gradient(135deg, #666, #555);
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.btn-bg.active {
  background: linear-gradient(135deg, #2ecc40, #27ae36);
  box-shadow: 0 3px 12px rgba(46, 204, 64, 0.4);
}

select {
  padding: 10px 16px;
  border-radius: 50px;
  border: 2px solid rgba(255, 165, 0, 0.3);
  background: rgba(255, 255, 255, 0.95);
  color: #333;
  font-size: 15px;
  font-weight: 600;
  outline: none;
  cursor: pointer;
  transition: border-color 0.3s, box-shadow 0.3s;
  appearance: auto;
}

select:focus {
  border-color: #ff8c00;
  box-shadow: 0 0 15px rgba(255, 140, 0, 0.3);
}

.buttons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
}

button {
  background: linear-gradient(135deg, #ff8c00, #ff6600);
  color: white;
  padding: 14px 30px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 15px rgba(255, 102, 0, 0.4), 0 2px 4px rgba(0,0,0,0.2);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}

button:hover::before {
  left: 100%;
}

button:hover {
  background: linear-gradient(135deg, #ffa033, #ff7711);
  box-shadow: 0 6px 25px rgba(255, 102, 0, 0.6), 0 3px 8px rgba(0,0,0,0.3);
  transform: translateY(-2px);
}

button:active {
  transform: translateY(0);
  box-shadow: 0 2px 8px rgba(255, 102, 0, 0.4);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

#image {
  margin-top: 25px;
  max-width: 100%;
  border-radius: 20px;
  display: none;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  border: 3px solid rgba(255, 165, 0, 0.3);
}

.loader {
  display: none;
  margin-top: 25px;
  text-align: center;
}

.loader-text {
  color: #ffd700;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 12px;
  animation: pulse 1.5s ease-in-out infinite;
}

.progress-bar-container {
  width: 100%;
  height: 10px;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.progress-bar {
  height: 100%;
  width: 30%;
  background: linear-gradient(90deg, #ff0000, #ff4444, #ff0000);
  border-radius: 10px;
  animation: progressSlide 1.8s ease-in-out infinite;
  box-shadow: 0 0 12px rgba(255, 0, 0, 0.6), 0 0 4px rgba(255, 0, 0, 0.4);
}

@keyframes progressSlide {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(430%); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.error {
  color: #ff6b6b;
  margin-top: 12px;
  display: none;
  font-weight: 600;
  background: rgba(255, 0, 0, 0.1);
  padding: 10px 15px;
  border-radius: 10px;
}

@media (max-width: 600px) {
  .container {
    width: 92%;
    padding: 25px 20px;
    margin-top: 40px;
  }
  .title-3d .letter {
    font-size: clamp(20px, 5vw, 28px);
  }
  button, .btn-bg {
    padding: 12px 22px;
    font-size: 15px;
  }
  select {
    font-size: 14px;
  }
}
</style>
</head>
<body>

<div id="bg-foliage">
  <div class="leaf leaf-1">
    <svg width="250" height="250" viewBox="0 0 100 100"><path d="M10 90 Q20 50 50 30 Q60 10 80 5 Q70 25 65 45 Q90 30 95 10 Q85 40 70 55 Q80 60 95 55 Q75 65 60 65 Q55 80 60 95 Q45 75 40 60 Q25 70 10 90Z"/></svg>
  </div>
  <div class="leaf leaf-2">
    <svg width="280" height="280" viewBox="0 0 100 100"><path d="M10 90 Q20 50 50 30 Q60 10 80 5 Q70 25 65 45 Q90 30 95 10 Q85 40 70 55 Q80 60 95 55 Q75 65 60 65 Q55 80 60 95 Q45 75 40 60 Q25 70 10 90Z"/></svg>
  </div>
  <div class="leaf leaf-3">
    <svg width="200" height="200" viewBox="0 0 100 100"><path d="M10 90 Q20 50 50 30 Q60 10 80 5 Q70 25 65 45 Q90 30 95 10 Q85 40 70 55 Q80 60 95 55 Q75 65 60 65 Q55 80 60 95 Q45 75 40 60 Q25 70 10 90Z"/></svg>
  </div>
  <div class="leaf leaf-4">
    <svg width="220" height="220" viewBox="0 0 100 100"><path d="M10 90 Q20 50 50 30 Q60 10 80 5 Q70 25 65 45 Q90 30 95 10 Q85 40 70 55 Q80 60 95 55 Q75 65 60 65 Q55 80 60 95 Q45 75 40 60 Q25 70 10 90Z"/></svg>
  </div>
  <div class="leaf leaf-5">
    <svg width="180" height="180" viewBox="0 0 100 100"><path d="M10 90 Q20 50 50 30 Q60 10 80 5 Q70 25 65 45 Q90 30 95 10 Q85 40 70 55 Q80 60 95 55 Q75 65 60 65 Q55 80 60 95 Q45 75 40 60 Q25 70 10 90Z"/></svg>
  </div>
  <div class="leaf leaf-6">
    <svg width="240" height="240" viewBox="0 0 100 100"><path d="M10 90 Q20 50 50 30 Q60 10 80 5 Q70 25 65 45 Q90 30 95 10 Q85 40 70 55 Q80 60 95 55 Q75 65 60 65 Q55 80 60 95 Q45 75 40 60 Q25 70 10 90Z"/></svg>
  </div>
</div>

<div id="bananas-container"></div>

<div class="container">
  <div class="title-3d" id="title">
    <span class="letter" style="animation-delay:0s">N</span>
    <span class="letter" style="animation-delay:0.15s">a</span>
    <span class="letter" style="animation-delay:0.3s">n</span>
    <span class="letter" style="animation-delay:0.45s">o</span>
    <span class="letter space"></span>
    <span class="letter" style="animation-delay:0.6s">B</span>
    <span class="letter" style="animation-delay:0.75s">a</span>
    <span class="letter" style="animation-delay:0.9s">n</span>
    <span class="letter" style="animation-delay:1.05s">a</span>
    <span class="letter" style="animation-delay:1.2s">n</span>
    <span class="letter" style="animation-delay:1.35s">a</span>
    <span class="letter space"></span>
    <span class="letter" style="animation-delay:1.5s">A</span>
    <span class="letter" style="animation-delay:1.65s">I</span>
  </div>

  <textarea id="prompt" placeholder="Decris ton image..."></textarea>

  <div class="options-section">
    <button type="button" class="btn-bg" id="btnChangeBg" onclick="addChangeBg()">Changer le fond</button>

    <select id="angleSelect">
      <option value="">-- Angle de vue --</option>
      <option value="normal angle, straight-on view">Angle normal</option>
      <option value="high angle, bird's eye view, looking down">Plongee</option>
      <option value="low angle, looking up, dramatic perspective">Contre-plongee</option>
      <option value="side profile view, lateral angle">Angle de profil</option>
      <option value="diagonal angle, dutch angle, tilted perspective">Angle en diagonale</option>
    </select>
  </div>

  <div class="buttons">
    <button id="btnOptimize" onclick="optimize()">Optimiser</button>
    <button id="btnGenerate" onclick="generate()">Generer</button>
  </div>

  <div class="loader" id="loader">
    <div class="loader-text" id="loader-text">Chargement...</div>
    <div class="progress-bar-container">
      <div class="progress-bar"></div>
    </div>
  </div>
  <div class="error" id="error"></div>

  <img id="image" alt="Image generee"/>
</div>

<script>
(function initBananas() {
  var container = document.getElementById("bananas-container");
  var count = 12;
  for (var i = 0; i < count; i++) {
    var banana = document.createElement("div");
    banana.classList.add("banana");
    banana.textContent = "\uD83C\uDF4C";
    var size = 25 + Math.random() * 30;
    banana.style.fontSize = size + "px";
    banana.style.left = Math.random() * 100 + "%";
    banana.style.opacity = 0.2 + Math.random() * 0.4;
    var duration = 15 + Math.random() * 25;
    banana.style.animationDuration = duration + "s";
    banana.style.animationDelay = -(Math.random() * duration) + "s";
    container.appendChild(banana);
  }
})();

function addChangeBg() {
  var promptEl = document.getElementById("prompt");
  var btn = document.getElementById("btnChangeBg");
  var text = ", change the background";
  if (promptEl.value.indexOf(text) === -1) {
    promptEl.value = promptEl.value.trim() + text;
    btn.classList.add("active");
  } else {
    promptEl.value = promptEl.value.replace(text, "");
    btn.classList.remove("active");
  }
}

async function optimize() {
  var promptEl = document.getElementById("prompt");
  var prompt = promptEl.value.trim();
  if (!prompt) return alert("Entre une description d'abord.");

  var loader = document.getElementById("loader");
  var error = document.getElementById("error");
  var btn = document.getElementById("btnOptimize");

  document.getElementById("loader-text").textContent = "Optimisation du prompt...";
  loader.style.display = "block";
  error.style.display = "none";
  btn.disabled = true;

  try {
    var res = await fetch("/optimize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: prompt })
    });

    var data = await res.json();

    if (!res.ok) throw new Error(data.error || "Erreur serveur");

    if (data.optimized) {
      promptEl.value = data.optimized;
    }
  } catch (e) {
    error.textContent = "Erreur optimisation : " + e.message;
    error.style.display = "block";
  } finally {
    loader.style.display = "none";
    btn.disabled = false;
  }
}

async function generate() {
  var promptEl = document.getElementById("prompt");
  var prompt = promptEl.value.trim();
  if (!prompt) return alert("Entre une description d'abord.");

  var angle = document.getElementById("angleSelect").value;
  var finalPrompt = prompt;
  if (angle) {
    finalPrompt = finalPrompt + ", " + angle;
  }
  finalPrompt = finalPrompt + ", image size 800x1000 pixels, portrait orientation";

  var loader = document.getElementById("loader");
  var error = document.getElementById("error");
  var img = document.getElementById("image");
  var btn = document.getElementById("btnGenerate");

  document.getElementById("loader-text").textContent = "Generation de l'image... (30-60 secondes)";
  loader.style.display = "block";
  error.style.display = "none";
  img.style.display = "none";
  btn.disabled = true;

  try {
    var res = await fetch("/generate-image", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: finalPrompt })
    });

    var data = await res.json();

    if (!res.ok) throw new Error(data.error || "Erreur serveur");

    if (data.image) {
      img.src = "data:image/png;base64," + data.image;
      img.style.display = "block";
    }
  } catch (e) {
    error.textContent = "Erreur generation : " + e.message;
    error.style.display = "block";
  } finally {
    loader.style.display = "none";
    btn.disabled = false;
  }
}
</script>

</body>
</html>
